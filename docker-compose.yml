version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: pulsewatch-db
    environment:
      POSTGRES_USER: pulsewatch
      POSTGRES_PASSWORD: pulsewatch_secret
      POSTGRES_DB: pulsewatch
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsewatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/PulseWatch.API/Dockerfile
    container_name: pulsewatch-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=pulsewatch;Username=pulsewatch;Password=pulsewatch_secret"
      JwtSettings__Secret: "PulseWatch-SuperSecret-JWT-Key-2024-Must-Be-Long-Enough"
      JwtSettings__Issuer: "PulseWatch"
      JwtSettings__Audience: "PulseWatchUsers"
      JwtSettings__ExpiryInMinutes: "60"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulsewatch-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
