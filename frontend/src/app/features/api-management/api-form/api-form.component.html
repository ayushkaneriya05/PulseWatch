<div class="form-page">
  <div class="form-card">
    <div class="form-header">
      <a routerLink="/api-management" class="back-link">← Back</a>
      <h1>{{ isEdit ? 'Edit API' : 'Add New API' }}</h1>
      <p>{{ isEdit ? 'Update your API endpoint configuration' : 'Register an API endpoint for monitoring' }}</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="api-form">
      <div class="form-group" *ngIf="error">
        <div class="error-message">{{ error }}</div>
      </div>

      <div class="form-group">
        <label for="name">API Name</label>
        <input type="text" id="name" [(ngModel)]="name" name="name" placeholder="e.g. Payment Service" required />
      </div>

      <div class="form-group">
        <label for="url">Endpoint URL</label>
        <input type="url" id="url" [(ngModel)]="url" name="url" placeholder="https://api.example.com/health" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="method">HTTP Method</label>
          <select id="method" [(ngModel)]="httpMethod" name="httpMethod">
            <option *ngFor="let method of httpMethods" [value]="method">{{ method }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="interval">Check Interval</label>
          <select id="interval" [(ngModel)]="checkIntervalSeconds" name="checkIntervalSeconds">
            <option *ngFor="let int of intervals" [ngValue]="int.value">{{ int.label }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="expectedStatus">Expected Status</label>
          <input type="number" id="expectedStatus" [(ngModel)]="expectedStatusCode" name="expectedStatusCode" min="100" max="599" />
        </div>
      </div>

      <div class="form-group">
        <label for="description">Description (optional)</label>
        <textarea id="description" [(ngModel)]="description" name="description" placeholder="Brief description..." rows="3"></textarea>
      </div>

      <div class="form-actions">
        <a routerLink="/api-management" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Saving...' : (isEdit ? 'Update API' : 'Add API') }}
        </button>
      </div>
    </form>
  </div>
</div>
